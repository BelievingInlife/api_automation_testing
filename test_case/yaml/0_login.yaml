base_info:
 project: "pay-mock"
 module: "login功能"
 version: "v1"
 title: "用户名密码登陆验证"


case_steps:
- function_name: "login_username"
  url: "{{url}}/login/username"
  method: POST
  headers:
   context-type: application/json
  body:
   username: "{{username}}"
   password: "{{password}}"
  response_assert:
   - eq: ["$.status", 200]
   - eq: ["$.message", "{{expected}}"]
  response_extract:
   token: "$..token"



test_datas:
  - title: "用户名密码正确"
    username: "admin"
    password: "123456"
    expected: "Login Successful"